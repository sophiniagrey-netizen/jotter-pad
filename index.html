<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Jotter Pad">
<meta name="theme-color" content="#FFFDF5">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" href="icon-192.png">
<title>Jotter Pad</title>
<!-- No external font CDN: this app must work with zero network access.
     System font stacks below give a similar feel and are always available offline. -->
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #FFFDF5;
    color: #1E293B;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  @keyframes float { 0%,100%{transform:translateY(0)rotate(0deg)}50%{transform:translateY(-12px)rotate(5deg)} }
  @keyframes float-delay { 0%,100%{transform:translateY(0)rotate(45deg)}50%{transform:translateY(-10px)rotate(50deg)} }
  @keyframes pop-in { 0%{transform:scale(0.8)rotate(-3deg);opacity:0}70%{transform:scale(1.02)rotate(1deg);opacity:1}100%{transform:scale(1)rotate(0deg);opacity:1} }
  @keyframes slide-up { 0%{transform:translateY(24px);opacity:0}100%{transform:translateY(0);opacity:1} }
  @keyframes blob-morph { 0%,100%{border-radius:60% 40% 30% 70%/60% 30% 70% 40%}50%{border-radius:30% 60% 70% 40%/50% 60% 30% 60%} }
  @keyframes blob-morph-2 { 0%,100%{border-radius:40% 60% 70% 30%/40% 50% 60% 50%}50%{border-radius:60% 40% 30% 70%/50% 30% 50% 60%} }
  @keyframes blob-morph-3 { 0%,100%{border-radius:30% 70% 50% 50%/50% 40% 60% 50%}50%{border-radius:70% 30% 40% 60%/40% 60% 40% 60%} }
  @keyframes wiggle { 0%,100%{transform:rotate(0deg)}25%{transform:rotate(-2deg)}75%{transform:rotate(2deg)} }
  @keyframes pulse-glow { 0%,100%{box-shadow:0 0 0 0 rgba(139,92,246,0.4)}50%{box-shadow:0 0 0 8px rgba(139,92,246,0)} }

  .animate-float { animation: float 6s ease-in-out infinite; }
  .animate-float-delay { animation: float-delay 7s ease-in-out infinite; }
  .animate-pop-in { animation: pop-in .4s cubic-bezier(.34,1.56,.64,1) forwards; }
  .animate-slide-up { animation: slide-up .4s cubic-bezier(.34,1.56,.64,1) forwards; }

  .blob-bg {
    position: fixed; inset: 0;
    overflow: hidden; pointer-events: none; z-index: 0;
    background: #FFFDF5;
  }
  .blob {
    position: absolute;
    filter: blur(40px);
    opacity: 0.35;
    pointer-events: none;
  }
  .blob-1 { width: 300px; height: 300px; background: #FBBF24; top: -60px; left: -80px; animation: blob-morph 8s ease-in-out infinite; }
  .blob-2 { width: 250px; height: 250px; background: #F472B6; top: 10%; right: -60px; animation: blob-morph-2 10s ease-in-out infinite; }
  .blob-3 { width: 200px; height: 200px; background: #8B5CF6; bottom: 15%; left: -40px; animation: blob-morph-3 9s ease-in-out infinite; }
  .blob-4 { width: 180px; height: 180px; background: #34D399; bottom: -40px; right: 20%; animation: blob-morph 7s ease-in-out infinite; }
  .blob-5 { width: 150px; height: 150px; background: #38BDF8; top: 40%; left: 30%; animation: blob-morph-2 11s ease-in-out infinite; opacity: 0.2; }

  #app-shell { width: 100%; height: 100%; display: flex; flex-direction: column; position: relative; z-index: 1; }

  #splash-screen {
    position: fixed; inset: 0; z-index: 100;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #FFFDF5;
    transition: opacity .6s ease;
  }
  #splash-screen.hidden { opacity: 0; pointer-events: none; }

  .splash-logo-wrap { position: relative; margin-bottom: 32px; }
  .splash-circle-1 { position: absolute; top: -16px; left: -16px; width: 80px; height: 80px; background: #FBBF24; border-radius: 50%; opacity: .8; animation: blob-morph 4s ease-in-out infinite; }
  .splash-circle-2 { position: absolute; bottom: -8px; right: -12px; width: 56px; height: 56px; background: #F472B6; border-radius: 50%; opacity: .7; transform: rotate(12deg); animation: blob-morph-2 5s ease-in-out infinite; }
  .splash-card { position: relative; background: #fff; border: 3px solid #1E293B; border-radius: 24px; padding: 32px 40px; box-shadow: 6px 6px 0 0 #1E293B; transform: rotate(-2deg); animation: wiggle 0.5s ease-in-out 0.3s; }
  .splash-card h1 { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; font-size: 40px; font-weight: 800; color: #1E293B; margin: 0 0 4px 0; }
  .splash-card p { font-size: 15px; font-weight: 500; color: #64748B; margin: 0; }

  .splash-btn { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; font-size: 18px; font-weight: 700; background: #8B5CF6; color: #fff; border: 3px solid #1E293B; border-radius: 9999px; padding: 14px 32px; box-shadow: 4px 4px 0 0 #1E293B; display: flex; align-items: center; gap: 10px; cursor: pointer; outline: none; transition: all .2s cubic-bezier(.34,1.56,.64,1); margin-bottom: 20px; }
  .splash-btn:active { box-shadow: 2px 2px 0 0 #1E293B; transform: translate(2px, 2px); }
  .splash-btn-icon { width: 28px; height: 28px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

  .splash-dots { display: flex; gap: 8px; }
  .splash-dots span { width: 10px; height: 10px; border-radius: 50%; }

  .side-panel-overlay { position: fixed; inset: 0; z-index: 150; background: rgba(30,41,59,.3); backdrop-filter: blur(2px); opacity: 0; pointer-events: none; transition: opacity .3s ease; }
  .side-panel-overlay.show { opacity: 1; pointer-events: auto; }
  .side-panel { position: fixed; top: 0; left: 0; bottom: 0; width: 280px; max-width: 85vw; background: #fff; border-right: 3px solid #1E293B; box-shadow: 6px 0 0 0 #E2E8F0; z-index: 160; transform: translateX(-100%); transition: transform .35s cubic-bezier(.34,1.56,.64,1); display: flex; flex-direction: column; overflow: hidden; }
  .side-panel.show { transform: translateX(0); }
  .side-panel-header { padding: 20px 16px 12px; border-bottom: 2px solid #E2E8F0; background: #FFFDF5; }
  .side-panel-title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; font-size: 22px; font-weight: 800; display: flex; align-items: center; gap: 10px; }
  .side-panel-sub { font-size: 12px; color: #64748B; margin-top: 2px; }
  .side-panel-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 12px; }
  .side-panel-scroll::-webkit-scrollbar { display: none; }
  .side-page-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 14px; border: 2px solid transparent; cursor: pointer; outline: none; transition: all .2s cubic-bezier(.34,1.56,.64,1); margin-bottom: 6px; position: relative; }
  .side-page-item:hover, .side-page-item:active { border-color: #1E293B; box-shadow: 2px 2px 0 0 #1E293B; transform: translateX(2px); }
  .side-page-item.active { background: #F1F5F9; border-color: #1E293B; box-shadow: 3px 3px 0 0 #1E293B; }
  .side-page-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; border: 2px solid #1E293B; box-shadow: 1px 1px 0 0 #1E293B; flex-shrink: 0; }
  .side-page-info { flex: 1; min-width: 0; }
  .side-page-name { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .side-page-count { font-size: 11px; color: #64748B; }
  .side-page-badge { width: 22px; height: 22px; border-radius: 50%; background: #EF4444; color: #fff; font-size: 10px; font-weight: 800; display: flex; align-items: center; justify-content: center; border: 1.5px solid #fff; flex-shrink: 0; }
  .side-panel-footer { padding: 12px; border-top: 2px solid #E2E8F0; background: #FFFDF5; }
  .side-panel-btn { width: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; font-size: 14px; font-weight: 700; padding: 12px; border-radius: 9999px; border: 2px solid #1E293B; cursor: pointer; outline: none; transition: all .15s ease; box-shadow: 2px 2px 0 0 #1E293B; background: #8B5CF6; color: #fff; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .side-panel-btn:active { box-shadow: 1px 1px 0 0 #1E293B; transform: translate(1px, 1px); }
  .side-panel-section-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #94A3B8; padding: 8px 12px 4px; }

  .top-bar { height: 56px; flex-shrink: 0; background: rgba(255,255,255,0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 3px solid #1E293B; box-shadow: 0 3px 0 0 #E2E8F0; display: flex; align-items: center; justify-content: space-between; padding: 0 14px; position: relative; z-index: 10; }
  .top-bar-left { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
  .top-bar-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; border: 2px solid #1E293B; box-shadow: 2px 2px 0 0 #1E293B; flex-shrink: 0; }
  .top-bar-title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; font-size: 18px; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .top-bar-sub { font-size: 11px; font-weight: 500; color: #64748B; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .top-bar-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .btn-icon { width: 36px; height: 36px; border-radius: 10px; border: 2px solid #1E293B; box-shadow: 2px 2px 0 0 #1E293B; background: #fff; color: #1E293B; display: flex; align-items: center; justify-content: center; cursor: pointer; outline: none; padding: 0; transition: all .15s ease; }
  .btn-icon:active { box-shadow: 1px 1px 0 0 #1E293B; transform: translate(1px, 1px); }
  .btn-icon.active { background: #8B5CF6; color: #fff; }

  .page-tabs-wrap { padding: 10px 14px 6px; overflow-x: auto; -webkit-overflow-scrolling: touch; flex-shrink: 0; background: rgba(255,255,255,0.7); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
  .page-tabs-wrap::-webkit-scrollbar { display: none; }
  .page-tabs { display: flex; gap: 8px; padding-bottom: 4px; }
  .page-tab { display: flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 9999px; border: 2px solid #1E293B; background: #fff; box-shadow: 2px 2px 0 0 #E2E8F0; cursor: pointer; outline: none; transition: all .15s ease; flex-shrink: 0; font-size: 13px; font-weight: 700; white-space: nowrap; }
  .page-tab:active { box-shadow: 1px 1px 0 0 #E2E8F0; transform: translate(1px, 1px); }
  .page-tab.active { background: #1E293B; color: #fff; box-shadow: 2px 2px 0 0 #8B5CF6; }
  .page-tab-icon { width: 18px; height: 18px; border-radius: 5px; display: flex; align-items: center; justify-content: center; border: 1.5px solid currentColor; }
  .page-tab-count { width: 20px; height: 20px; border-radius: 50%; background: #EF4444; color: #fff; font-size: 9px; font-weight: 800; display: flex; align-items: center; justify-content: center; border: 1.5px solid #fff; }

  .scroll-area { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; overscroll-behavior-y: contain; padding: 14px; position: relative; }
  .scroll-area::-webkit-scrollbar { display: none; }

  .jots-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  @media (min-width: 480px) { .jots-grid { grid-template-columns: repeat(3, 1fr); gap: 14px; } }
  @media (min-width: 768px) { .jots-grid { grid-template-columns: repeat(4, 1fr); gap: 16px; } }

  .jot-card { background: #fff; border: 2px solid #1E293B; border-radius: 16px; padding: 12px; box-shadow: 4px 4px 0 0 #E2E8F0; cursor: pointer; position: relative; transition: all .2s cubic-bezier(.34,1.56,.64,1); display: flex; flex-direction: column; min-height: 140px; }
  .jot-card:hover { transform: translateY(-2px) rotate(-0.5deg); box-shadow: 5px 6px 0 0 #E2E8F0; }
  .jot-card:active { transform: scale(.97); box-shadow: 2px 2px 0 0 #E2E8F0; }
  .jot-card.pinned { border-color: #8B5CF6; box-shadow: 4px 4px 0 0 #8B5CF6; }
  .jot-card.pinned:hover { box-shadow: 5px 6px 0 0 #8B5CF6; }
  .pin-badge { position: absolute; top: -8px; right: -8px; width: 24px; height: 24px; border-radius: 50%; background: #8B5CF6; border: 2px solid #1E293B; display: flex; align-items: center; justify-content: center; box-shadow: 1px 1px 0 0 #1E293B; z-index: 2; }
  .jot-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .jot-card-dot-date { display: flex; align-items: center; gap: 6px; }
  .jot-card-dot { width: 8px; height: 8px; border-radius: 50%; border: 2px solid #1E293B; flex-shrink: 0; }
  .jot-card-date { font-size: 10px; font-weight: 700; color: #64748B; }
  .jot-card-actions { display: flex; gap: 4px; opacity: 1; }
  .jot-card-action-btn { width: 26px; height: 26px; border-radius: 6px; border: 2px solid #CBD5E1; background: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; outline: none; padding: 0; transition: all .15s ease; }
  .jot-card-action-btn:active { transform: scale(.9); }
  .jot-card-action-btn.pinned-btn { background: #EDE9FE; border-color: #8B5CF6; color: #8B5CF6; }
  .jot-card-body { font-size: 13px; line-height: 1.5; color: #1E293B; flex: 1; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 5; -webkit-box-orient: vertical; word-break: break-word; }
  .jot-card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; padding-top: 8px; border-top: 1px solid #E2E8F0; }
  .jot-card-time { font-size: 10px; font-weight: 500; color: #94A3B8; }
  .jot-card-badges { display: flex; gap: 4px; }
  .jot-card-badge { font-size: 10px; padding: 2px 6px; background: #F1F5F9; border: 1px solid #E2E8F0; border-radius: 4px; }

  .jots-list { display: flex; flex-direction: column; gap: 10px; }
  .jot-list-item { background: #fff; border: 2px solid #1E293B; border-radius: 14px; padding: 12px 14px; box-shadow: 3px 3px 0 0 #E2E8F0; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: all .2s ease; }
  .jot-list-item:active { transform: scale(.98); box-shadow: 2px 2px 0 0 #E2E8F0; }
  .jot-list-item.pinned { border-color: #8B5CF6; box-shadow: 3px 3px 0 0 #8B5CF6; }
  .jot-list-dot { width: 10px; height: 10px; border-radius: 50%; border: 2px solid #1E293B; flex-shrink: 0; }
  .jot-list-text { flex: 1; min-width: 0; font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .jot-list-date { font-size: 10px; font-weight: 500; color: #64748B; flex-shrink: 0; }
  .jot-list-actions { display: flex; gap: 4px; flex-shrink: 0; }

  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; }
  .empty-icon-wrap { position: relative; margin-bottom: 20px; }
  .empty-icon-bg { position: absolute; top: -6px; left: -6px; width: 64px; height: 64px; background: #FBBF24; border-radius: 50%; opacity: .6; animation: blob-morph 4s ease-in-out infinite; }
  .empty-icon { position: relative; width: 52px; height: 52px; background: #fff; border: 3px solid #1E293B; border-radius: 14px; box-shadow: 3px 3px 0 0 #1E293B; display: flex; align-items: center; justify-content: center; }
  .empty-title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; font-size: 18px; font-weight: 700; margin-bottom: 4px; text-align: center; }
  .empty-desc { font-size: 13px; color: #64748B; margin-bottom: 20px; text-align: center; }
  .empty-btn { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; font-size: 15px; font-weight: 700; background: #8B5CF6; color: #fff; border: 2px solid #1E293B; border-radius: 9999px; padding: 12px 28px; box-shadow: 3px 3px 0 0 #1E293B; cursor: pointer; outline: none; transition: all .15s ease; }
  .empty-btn:active { box-shadow: 1px 1px 0 0 #1E293B; transform: translate(1px, 1px); }

  .bottom-nav { height: 64px; flex-shrink: 0; background: rgba(255,255,255,0.9); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-top: 3px solid #1E293B; box-shadow: 0 -3px 0 0 #E2E8F0; display: flex; align-items: center; justify-content: space-around; padding: 0 8px; position: relative; z-index: 10; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .bottom-nav::-webkit-scrollbar { display: none; }
  .bottom-nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; padding: 4px 10px; border-radius: 12px; border: 2px solid transparent; cursor: pointer; outline: none; transition: all .15s ease; flex-shrink: 0; min-width: 56px; position: relative; }
  .bottom-nav-item.active { background: #F1F5F9; border-color: #1E293B; box-shadow: 2px 2px 0 0 #1E293B; }
  .bottom-nav-item:active { transform: scale(.95); }
  .bottom-nav-icon { width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; border: 2px solid #1E293B; box-shadow: 1px 1px 0 0 #1E293B; }
  .bottom-nav-label { font-size: 9px; font-weight: 700; color: #64748B; white-space: nowrap; }
  .bottom-nav-item.active .bottom-nav-label { color: #1E293B; }
  .bottom-nav-badge { position: absolute; top: 2px; right: 2px; width: 14px; height: 14px; border-radius: 50%; background: #EF4444; color: #fff; font-size: 8px; font-weight: 800; display: flex; align-items: center; justify-content: center; border: 1.5px solid #fff; }
  .bottom-nav-add { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; padding: 4px 10px; border-radius: 12px; border: 2px dashed #CBD5E1; cursor: pointer; outline: none; transition: all .15s ease; flex-shrink: 0; min-width: 56px; }
  .bottom-nav-add:active { transform: scale(.95); border-color: #8B5CF6; }
  .bottom-nav-add-icon { width: 28px; height: 28px; border-radius: 8px; background: #F1F5F9; display: flex; align-items: center; justify-content: center; border: 2px solid #1E293B; box-shadow: 1px 1px 0 0 #1E293B; }

  .modal-overlay { position: fixed; inset: 0; z-index: 200; display: none; flex-direction: column; background: rgba(30,41,59,.5); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); opacity: 0; transition: opacity .25s ease; }
  .modal-overlay.show { display: flex; opacity: 1; }
  .modal-sheet { margin-top: auto; background: #fff; border-top: 3px solid #1E293B; border-radius: 24px 24px 0 0; box-shadow: 0 -6px 0 0 #E2E8F0; padding: 20px 16px 32px 16px; max-height: 92vh; display: flex; flex-direction: column; transform: translateY(100%); transition: transform .35s cubic-bezier(.34,1.56,.64,1); }
  .modal-overlay.show .modal-sheet { transform: translateY(0); }
  .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .modal-title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; font-size: 20px; font-weight: 800; }
  .modal-close { width: 36px; height: 36px; border-radius: 50%; border: 2px solid #1E293B; background: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; outline: none; padding: 0; box-shadow: 2px 2px 0 0 #1E293B; transition: all .15s ease; }
  .modal-close:active { box-shadow: 1px 1px 0 0 #1E293B; transform: translate(1px, 1px); }
  .modal-body { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .modal-body::-webkit-scrollbar { display: none; }

  .editor-toolbar { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; padding: 8px; background: #F1F5F9; border-radius: 12px; margin-bottom: 12px; }
  .toolbar-btn { width: 34px; height: 34px; border-radius: 8px; border: 2px solid #CBD5E1; background: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; outline: none; padding: 0; transition: all .15s ease; flex-shrink: 0; }
  .toolbar-btn:active { transform: scale(.9); }
  .toolbar-btn.active { background: #EDE9FE; border-color: #8B5CF6; box-shadow: 1px 1px 0 0 #8B5CF6; }
  .toolbar-sep { width: 1px; height: 22px; background: #CBD5E1; margin: 0 2px; flex-shrink: 0; }
  .toolbar-select { height: 34px; border-radius: 8px; border: 2px solid #CBD5E1; background: #fff; font-size: 11px; font-weight: 700; padding: 0 6px; outline: none; cursor: pointer; flex-shrink: 0; }
  .editor-area { background: #FFFDF5; border: 2px solid #CBD5E1; border-radius: 14px; padding: 14px; min-height: 200px; font-size: 15px; line-height: 1.6; color: #1E293B; outline: none; transition: all .2s ease; -webkit-user-select: text; user-select: text; }
  .editor-area:focus { border-color: #8B5CF6; box-shadow: 3px 3px 0 0 #8B5CF6; }
  .editor-footer { display: flex; gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 2px solid #E2E8F0; }
  .editor-footer button { flex: 1; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; font-size: 13px; font-weight: 700; padding: 10px 8px; border-radius: 9999px; border: 2px solid #1E293B; cursor: pointer; outline: none; transition: all .15s ease; white-space: nowrap; }
  .editor-footer button:active { box-shadow: 1px 1px 0 0 #1E293B; transform: translate(1px, 1px); }

  .archive-section { margin-bottom: 16px; }

  .archive-item { background: #fff; border: 2px solid #1E293B; border-radius: 12px; padding: 10px 12px; box-shadow: 2px 2px 0 0 #E2E8F0; display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .archive-item-text { flex: 1; min-width: 0; font-size: 13px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .archive-item-date { font-size: 10px; font-weight: 500; color: #64748B; flex-shrink: 0; }
  .archive-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .archive-btn { font-size: 11px; font-weight: 700; padding: 5px 10px; border-radius: 9999px; border: 2px solid #1E293B; cursor: pointer; outline: none; background: #fff; box-shadow: 1px 1px 0 0 #1E293B; transition: all .1s ease; }
  .archive-btn:active { box-shadow: 0 0 0 0; transform: translate(1px, 1px); }
  .archive-btn-delete { border-color: #EF4444; color: #EF4444; box-shadow: 1px 1px 0 0 #EF4444; }

  .toast-wrap { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(100px); z-index: 300; opacity: 0; transition: all .4s cubic-bezier(.34,1.56,.64,1); pointer-events: none; }
  .toast-wrap.show { transform: translateX(-50%) translateY(0); opacity: 1; pointer-events: auto; }
  .toast-box { background: #1E293B; color: #fff; padding: 10px 12px 10px 18px; border-radius: 12px; border: 2px solid #fff; box-shadow: 3px 3px 0 0 #8B5CF6; display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 700; white-space: nowrap; }
  .toast-icon { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .toast-undo-btn { background: #8B5CF6; color: #fff; border: none; border-radius: 8px; padding: 6px 12px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; font-size: 12px; font-weight: 800; cursor: pointer; outline: none; margin-left: 4px; }
  .toast-undo-btn:active { transform: scale(.94); }

  .fab { position: fixed; bottom: 80px; right: 16px; z-index: 50; width: 56px; height: 56px; border-radius: 50%; background: #8B5CF6; border: 3px solid #1E293B; box-shadow: 3px 3px 0 0 #1E293B; display: flex; align-items: center; justify-content: center; cursor: pointer; outline: none; padding: 0; transition: all .2s cubic-bezier(.34,1.56,.64,1); }
  .fab:hover { animation: pulse-glow 2s ease-in-out infinite; }
  .fab:active { box-shadow: 1px 1px 0 0 #1E293B; transform: translate(2px, 2px) scale(.95); }

  @supports (padding-bottom: env(safe-area-inset-bottom)) {
    .bottom-nav { padding-bottom: env(safe-area-inset-bottom); height: calc(64px + env(safe-area-inset-bottom)); }
    .scroll-area { padding-bottom: calc(14px + env(safe-area-inset-bottom)); }
    .fab { bottom: calc(80px + env(safe-area-inset-bottom)); }
    .toast-wrap { bottom: calc(80px + env(safe-area-inset-bottom)); }
  }

  .effect-highlight { background: linear-gradient(120deg, #FBBF24 0%, #FBBF24 100%); background-repeat: no-repeat; background-size: 100% 40%; background-position: 0 88%; }
  .effect-underline-wavy { text-decoration: wavy underline #F472B6; text-decoration-thickness: 2px; }
  .effect-glow { text-shadow: 0 0 8px rgba(139,92,246,0.5), 0 0 16px rgba(139,92,246,0.3); }

  #confetti-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 90; }

  #js-test.hide{opacity:0;pointer-events:none}

</head>

  <div class="modal-sheet">
    <div class="modal-header">
      <div class="modal-title">New Jotter Page</div>
      <button class="modal-close" data-action="closeNewPage">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1E293B" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div style="margin-bottom:16px">
        <label class="input-label">Page Name</label>
        <input type="text" id="new-page-name" class="input-field" placeholder="e.g. Travel Jots">
      </div>
      <div style="margin-bottom:16px">
        <label class="input-label">Choose Color</label>
        <div class="color-grid">
          <button class="color-option" style="background:#8B5CF6" data-action="pickColor" data-color="violet"></button>
          <button class="color-option" style="background:#F472B6" data-action="pickColor" data-color="pink"></button>
          <button class="color-option" style="background:#FBBF24" data-action="pickColor" data-color="amber"></button>
          <button class="color-option" style="background:#34D399" data-action="pickColor" data-color="emerald"></button>
          <button class="color-option" style="background:#38BDF8" data-action="pickColor" data-color="sky"></button>
          <button class="color-option" style="background:#FB7185" data-action="pickColor" data-color="rose"></button>
          <button class="color-option" style="background:#FB923C" data-action="pickColor" data-color="orange"></button>
          <button class="color-option" style="background:#A78BFA" data-action="pickColor" data-color="purple"></button>
        </div>
      </div>
      <button class="btn-full" style="background:#8B5CF6;color:#fff" data-action="createPage">Create Page</button>
    </div>
  </div>
</div>

<div id="archive-modal" class="modal-overlay" data-action="closeArchiveOverlay">
  <div class="modal-sheet">
    <div class="modal-header">
      <div class="modal-title" style="display:flex;align-items:center;gap:8px">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#64748B" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Archived Jots
      </div>
      <button class="modal-close" data-action="closeArchive">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1E293B" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal-body" id="archive-body"></div>
  </div>
</div>

<div class="toast-wrap" id="toast">
  <div class="toast-box">
    <div class="toast-icon" id="toast-icon" style="background:#34D399">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
    </div>
    <span id="toast-msg">Saved!</span>
    <button id="toast-undo" class="toast-undo-btn" data-action="undoDelete" style="display:none">Undo</button>
  </div>
</div>

<script>
document.getElementById('js-test').textContent='JS parsed OK';


const colorMap={
  violet:{bg:'#8B5CF6',shadow:'#8B5CF6'},
  pink:{bg:'#F472B6',shadow:'#F472B6'},
  amber:{bg:'#FBBF24',shadow:'#FBBF24'},
  emerald:{bg:'#34D399',shadow:'#34D399'},
  sky:{bg:'#38BDF8',shadow:'#38BDF8'},
  rose:{bg:'#FB7185',shadow:'#FB7185'},
  orange:{bg:'#FB923C',shadow:'#FB923C'},
  purple:{bg:'#A78BFA',shadow:'#A78BFA'}
};

const defaultPages=[
  {id:'general',name:'General',color:'violet',icon:'sparkles',subtitle:'Random thoughts'},
  {id:'work',name:'Work',color:'sky',icon:'briefcase',subtitle:'Tasks & ideas'},
  {id:'health',name:'Health',color:'emerald',icon:'heart',subtitle:'Wellness notes'},
  {id:'personal',name:'Personal',color:'pink',icon:'user',subtitle:'Private thoughts'},
  {id:'mind',name:'Mind',color:'amber',icon:'brain',subtitle:'Mindfulness'}
];

function safeJSON(key,fallback){
  try{var raw=localStorage.getItem(key);if(!raw)return fallback;return JSON.parse(raw)}catch(e){console.warn('Bad localStorage for '+key+':',e);localStorage.removeItem(key);return fallback}
}
let pages=safeJSON('jotter_pages',[...defaultPages]);
let jots=safeJSON('jotter_jots',{});
let archived=safeJSON('jotter_archived',{});
let currentPage=pages[0].id;
let currentView='grid';
let editingJotId=null;
let pickedColor='violet';
let lastDeleted=null; // {source:'active'|'archived', pageId, jot, index}
let undoTimeout=null;

const icons={
  sparkles:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3L14.5 8.5L20 11L14.5 13.5L12 19L9.5 13.5L4 11L9.5 8.5Z"/></svg>',
  briefcase:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/></svg>',
  heart:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>',
  user:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>',
  brain:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9.5 2A2.5 2.5 0 0112 4.5v15a2.5 2.5 0 01-4.96.44 2.5 2.5 0 01-2.96-3.08 3 3 0 01-.34-5.58 2.5 2.5 0 014.96-3.44 2.5 2.5 0 012.96 3.08 3 3 0 01.34 5.58 2.5 2.5 0 01-2.96 3.08 2.5 2.5 0 01-4.96-.44"/><path d="M14.5 2A2.5 2.5 0 0117 4.5v15a2.5 2.5 0 01-4.96.44 2.5 2.5 0 01-2.96-3.08 3 3 0 01-.34-5.58 2.5 2.5 0 014.96-3.44 2.5 2.5 0 012.96 3.08 3 3 0 01.34 5.58 2.5 2.5 0 01-2.96 3.08 2.5 2.5 0 01-4.96-.44"/></svg>',
  archive:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>',
  default:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>'
};

const pinIconSmall='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="17" x2="12" y2="22"/><path d="M5 17h14l-1.5-2A6 6 0 0116 11V7a1 1 0 011-1 2 2 0 000-4H7a2 2 0 000 4 1 1 0 011 1v4a6 6 0 01-1.5 4z"/></svg>';
const pinIconBadge='<svg width="12" height="12" viewBox="0 0 24 24" fill="white" stroke="white" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="17" x2="12" y2="22"/><path d="M5 17h14l-1.5-2A6 6 0 0116 11V7a1 1 0 011-1 2 2 0 000-4H7a2 2 0 000 4 1 1 0 011 1v4a6 6 0 01-1.5 4z"/></svg>';

function init(){renderNav();renderPage()}

function enterApp(){
  document.getElementById('splash-screen').classList.add('hidden');
  setTimeout(()=>{
    document.getElementById('splash-screen').style.display='none';
    document.getElementById('app-shell').style.display='flex';
    fireConfetti();
  },600);
}

function renderNav(){
  const nav=document.getElementById('bottom-nav');
  nav.innerHTML='';
  pages.forEach(page=>{
    const isActive=page.id===currentPage;
    const c=colorMap[page.color]||colorMap.violet;
    const count=(jots[page.id]||[]).length;
    const btn=document.createElement('button');
    btn.className='bottom-nav-item'+(isActive?' active':'');
    btn.onclick=()=>switchPage(page.id);
    btn.innerHTML='<div class="bottom-nav-icon" style="background:'+c.bg+'">'+(icons[page.icon]||icons.default)+'</div><div class="bottom-nav-label">'+page.name+'</div>'+(count>0?'<div class="bottom-nav-badge">'+(count>99?'99+':count)+'</div>':'');
    nav.appendChild(btn);
  });
  const totalArchived=Object.values(archived).reduce((s,a)=>s+a.length,0);
  const archiveBtn=document.createElement('button');
  archiveBtn.className='bottom-nav-item';
  archiveBtn.onclick=()=>showArchive();
  archiveBtn.innerHTML='<div class="bottom-nav-icon" style="background:#64748B">'+icons.archive+'</div><div class="bottom-nav-label">Archive</div>'+(totalArchived>0?'<div class="bottom-nav-badge">'+(totalArchived>99?'99+':totalArchived)+'</div>':'');
  nav.appendChild(archiveBtn);
  const addBtn=document.createElement('button');
  addBtn.className='bottom-nav-add';
  addBtn.onclick=()=>showNewPage();
  addBtn.innerHTML='<div class="bottom-nav-add-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1E293B" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg></div><div class="bottom-nav-label" style="color:#64748B">New</div>';
  nav.appendChild(addBtn);
}

function switchPage(pageId){currentPage=pageId;renderNav();renderPage()}

function renderPage(){
  const page=pages.find(p=>p.id===currentPage);
  if(!page)return;
  const c=colorMap[page.color]||colorMap.violet;
  document.getElementById('page-title').textContent=page.name+' Jots';
  document.getElementById('page-subtitle').textContent=(jots[currentPage]||[]).length+' notes'+' · '+page.subtitle;
  document.getElementById('page-icon').innerHTML=icons[page.icon]||icons.default;
  document.getElementById('page-icon').style.background=c.bg;
  document.getElementById('empty-page-name').textContent=page.name.toLowerCase();
  renderJots();
}

function sortedPageJots(){
  return [...(jots[currentPage]||[])].sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0));
}

function renderJots(){
  const pageJots=sortedPageJots();
  const grid=document.getElementById('jots-grid');
  const list=document.getElementById('jots-list');
  const empty=document.getElementById('empty-state');
  const page=pages.find(p=>p.id===currentPage);
  const c=colorMap[page.color]||colorMap.violet;
  if(pageJots.length===0){
    grid.style.display='none';list.style.display='none';
    empty.style.display='flex';return;
  }
  empty.style.display='none';
  if(currentView==='grid'){
    grid.style.display='grid';list.style.display='none';
    grid.innerHTML='';
    pageJots.forEach((jot,i)=>grid.appendChild(makeCard(jot,c,i)));
  }else{
    grid.style.display='none';list.style.display='flex';
    list.innerHTML='';
    pageJots.forEach((jot,i)=>list.appendChild(makeListItem(jot,c,i)));
  }
}

function makeCard(jot,color,idx){
  const div=document.createElement('div');
  div.className='jot-card animate-pop-in'+(jot.pinned?' pinned':'');
  div.style.animationDelay=idx*0.04+'s';
  div.onclick=()=>openEditor(jot.id);
  const d=new Date(jot.date);
  const dateStr=d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
  const timeStr=d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  const tmp=document.createElement('div');tmp.innerHTML=jot.content;
  const txt=tmp.textContent||tmp.innerText||'Empty...';
  const preview=txt.substring(0,90)+(txt.length>90?'...':'');
  div.innerHTML=(jot.pinned?'<div class="pin-badge">'+pinIconBadge+'</div>':'')+'<div class="jot-card-header"><div class="jot-card-dot-date"><div class="jot-card-dot" style="background:'+color.bg+'"></div><span class="jot-card-date">'+dateStr+'</span></div><div class="jot-card-actions"><button class="jot-card-action-btn'+(jot.pinned?' pinned-btn':'')+'" data-action="doPin" data-jid="'+jot.id+'" title="Pin">'+pinIconSmall+'</button><button class="jot-card-action-btn" data-action="doArchive" data-jid="'+jot.id+'" title="Archive"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button><button class="jot-card-action-btn" data-action="doDelete" data-jid="'+jot.id+'" title="Delete"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button></div></div><div class="jot-card-body">'+(jot.content||'<span style="color:#CBD5E1;font-style:italic">Empty jot...</span>')+'</div><div class="jot-card-footer"><span class="jot-card-time">'+timeStr+'</span><div class="jot-card-badges">'+(jot.content.includes('<b>')||jot.content.includes('<strong>')?'<span class="jot-card-badge" style="font-weight:700">B</span>':'')+(jot.content.includes('<i>')||jot.content.includes('<em>')?'<span class="jot-card-badge" style="font-style:italic">I</span>':'')+(jot.content.includes('checklist-item')?'<span class="jot-card-badge">☑</span>':'')+'</div></div>';
  return div;
}

function makeListItem(jot,color,idx){
  const div=document.createElement('div');
  div.className='jot-list-item animate-pop-in'+(jot.pinned?' pinned':'');
  div.style.animationDelay=idx*0.04+'s';
  div.onclick=()=>openEditor(jot.id);
  const d=new Date(jot.date);
  const tmp=document.createElement('div');tmp.innerHTML=jot.content;
  const txt=tmp.textContent||tmp.innerText||'Empty...';
  const preview=(jot.pinned?'📌 ':'')+txt.substring(0,50)+(txt.length>50?'...':'');
  div.innerHTML='<div class="jot-list-dot" style="background:'+color.bg+'"></div><div class="jot-list-text">'+preview+'</div><div class="jot-list-date">'+d.toLocaleDateString('en-GB',{day:'numeric',month:'short'})+'</div><div class="jot-list-actions"><button class="jot-card-action-btn'+(jot.pinned?' pinned-btn':'')+'" data-action="doPin" data-jid="'+jot.id+'">'+pinIconSmall+'</button><button class="jot-card-action-btn" data-action="doArchive" data-jid="'+jot.id+'"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button><button class="jot-card-action-btn" data-action="doDelete" data-jid="'+jot.id+'"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button></div>';
  return div;
}

function toggleView(view){
  currentView=view;
  document.getElementById('btn-grid').classList.toggle('active',view==='grid');
  document.getElementById('btn-list').classList.toggle('active',view==='list');
  renderJots();
}

function addNewJot(){
  const id='jot_'+Date.now();
  if(!jots[currentPage])jots[currentPage]=[];
  jots[currentPage].unshift({id,content:'',date:new Date().toISOString(),pageId:currentPage,pinned:false});
  save();openEditor(id);
}

function openEditor(jotId){
  const jot=(jots[currentPage]||[]).find(j=>j.id===jotId);
  if(!jot)return;
  editingJotId=jotId;
  const page=pages.find(p=>p.id===currentPage);
  const c=colorMap[page.color]||colorMap.violet;
  document.getElementById('editor-dot').style.background=c.bg;
  document.getElementById('editor-date').textContent=new Date(jot.date).toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
  document.getElementById('editor').innerHTML=jot.content;
  document.getElementById('editor-pin-btn').classList.toggle('is-pinned',!!jot.pinned);
  document.getElementById('editor-modal').classList.add('show');
  setTimeout(()=>document.getElementById('editor').focus(),100);
}

function closeEditor(){document.getElementById('editor-modal').classList.remove('show');editingJotId=null}

function saveJot(){
  if(!editingJotId)return;
  const content=document.getElementById('editor').innerHTML;
  const jot=(jots[currentPage]||[]).find(j=>j.id===editingJotId);
  if(jot){jot.content=content;save();renderPage();toast('Jot saved!')}
  closeEditor();
}

function doDelete(jotId){
  const arr=jots[currentPage]||[];
  const idx=arr.findIndex(j=>j.id===jotId);
  if(idx===-1)return;
  lastDeleted={source:'active',pageId:currentPage,jot:arr[idx],index:idx};
  arr.splice(idx,1);
  save();renderPage();renderNav();
  toast('Deleted','delete',true);
}

function doArchive(jotId){
  const arr=jots[currentPage]||[];
  const idx=arr.findIndex(j=>j.id===jotId);
  if(idx===-1)return;
  const jot=arr[idx];
  jot.archivedDate=new Date().toISOString();
  if(!archived[currentPage])archived[currentPage]=[];
  archived[currentPage].unshift(jot);
  arr.splice(idx,1);
  save();renderPage();renderNav();toast('Archived');
}

function doPin(jotId){
  const jot=(jots[currentPage]||[]).find(j=>j.id===jotId);
  if(!jot)return;
  jot.pinned=!jot.pinned;
  save();renderPage();
  toast(jot.pinned?'Pinned to top':'Unpinned');
}

function pinCurrent(){
  if(!editingJotId)return;
  const jot=(jots[currentPage]||[]).find(j=>j.id===editingJotId);
  if(!jot)return;
  jot.pinned=!jot.pinned;
  document.getElementById('editor-pin-btn').classList.toggle('is-pinned',jot.pinned);
  save();
}

function deleteCurrent(){if(!editingJotId)return;doDelete(editingJotId);closeEditor()}
function archiveCurrent(){if(!editingJotId)return;doArchive(editingJotId);closeEditor()}

function showArchive(){
  const body=document.getElementById('archive-body');
  body.innerHTML='';
  let hasAny=false;
  Object.entries(archived).forEach(([pid,list])=>{
    if(!list.length)return;hasAny=true;
    const page=pages.find(p=>p.id===pid)||{name:'Unknown',color:'violet'};
    const c=colorMap[page.color]||colorMap.violet;
    const sec=document.createElement('div');sec.className='archive-section';
    sec.innerHTML='<div class="archive-section-title"><div style="width:8px;height:8px;border-radius:50%;border:2px solid #1E293B;background:'+c.bg+'"></div>'+page.name+'</div>';
    list.forEach(jot=>{
      const tmp=document.createElement('div');tmp.innerHTML=jot.content;
      const txt=(tmp.textContent||tmp.innerText||'Empty...').substring(0,80)+(tmp.textContent.length>80?'...':'');
      const item=document.createElement('div');item.className='archive-item';
      item.innerHTML='<div style="width:8px;height:8px;border-radius:50%;border:2px solid #1E293B;background:'+c.bg+';flex-shrink:0"></div><div class="archive-item-text">'+txt+'</div><div class="archive-item-date">'+new Date(jot.date).toLocaleDateString('en-GB',{day:'numeric',month:'short'})+'</div><div class="archive-actions"><button class="archive-btn" data-action="restoreJot" data-pid="'+pid+'" data-jid="'+jot.id+'">Restore</button><button class="archive-btn archive-btn-delete" data-action="permaDelete" data-pid="'+pid+'" data-jid="'+jot.id+'">Delete</button></div>';
      sec.appendChild(item);
    });
    body.appendChild(sec);
  });
  if(!hasAny)body.innerHTML='<div style="text-align:center;padding:40px 0;color:#64748B"><div style="font-size:40px;margin-bottom:8px">&#128230;</div><div style="font-weight:700">No archived jots</div><div style="font-size:13px;margin-top:4px">Archive jots to see them here</div></div>';
  document.getElementById('archive-modal').classList.add('show');
}

function closeArchive(){document.getElementById('archive-modal').classList.remove('show')}

function restoreJot(pid,jid){
  const list=archived[pid]||[];
  const idx=list.findIndex(j=>j.id===jid);
  if(idx===-1)return;
  if(!jots[pid])jots[pid]=[];
  jots[pid].unshift(list[idx]);
  list.splice(idx,1);
  save();renderPage();renderNav();showArchive();toast('Restored');
}

function permaDelete(pid,jid){
  const list=archived[pid]||[];
  const idx=list.findIndex(j=>j.id===jid);
  if(idx===-1)return;
  lastDeleted={source:'archived',pageId:pid,jot:list[idx],index:idx};
  list.splice(idx,1);
  save();renderPage();showArchive();
  toast('Deleted forever','delete',true);
}

function undoDelete(){
  if(!lastDeleted)return;
  const {source,pageId,jot,index}=lastDeleted;
  if(source==='active'){
    if(!jots[pageId])jots[pageId]=[];
    jots[pageId].splice(Math.min(index,jots[pageId].length),0,jot);
  }else{
    if(!archived[pageId])archived[pageId]=[];
    archived[pageId].splice(Math.min(index,archived[pageId].length),0,jot);
  }
  lastDeleted=null;
  clearTimeout(undoTimeout);
  save();
  renderNav();
  if(pageId===currentPage)renderPage();
  if(document.getElementById('archive-modal').classList.contains('show'))showArchive();
  hideToast();
  toast('Restored');
}

function showNewPage(){
  document.getElementById('new-page-name').value='';
  pickedColor='violet';
  updateColorUI();
  document.getElementById('newpage-modal').classList.add('show');
}

function closeNewPage(){document.getElementById('newpage-modal').classList.remove('show')}

function pickColor(c){pickedColor=c;updateColorUI()}

function updateColorUI(){
  document.querySelectorAll('.color-option').forEach(btn=>{
    btn.classList.toggle('selected',btn.dataset.color===pickedColor);
  });
}

function createPage(){
  const name=document.getElementById('new-page-name').value.trim();
  if(!name){toast('Enter a name','error');return}
  const id='page_'+Date.now();
  pages.push({id,name,color:pickedColor,icon:'default',subtitle:'Custom page'});
  save();renderNav();switchPage(id);closeNewPage();toast('Page created!');
}

function fmt(cmd,val){restoreEditorSelection();document.execCommand(cmd,false,val);document.getElementById('editor').focus()}

let savedRange=null;

document.addEventListener('selectionchange',()=>{
  const sel=window.getSelection();
  if(!sel||sel.rangeCount===0)return;
  const range=sel.getRangeAt(0);
  const editor=document.getElementById('editor');
  if(editor && editor.contains(range.commonAncestorContainer)){
    savedRange=range.cloneRange();
  }
});

function restoreEditorSelection(){
  const editor=document.getElementById('editor');
  editor.focus();
  if(savedRange){
    const sel=window.getSelection();
    sel.removeAllRanges();
    sel.addRange(savedRange);
  }
}

function changeFont(fontFamily){
  restoreEditorSelection();
  document.execCommand('fontName',false,fontFamily);
  document.getElementById('editor').focus();
}

function insertChecklist(){
  const editor=document.getElementById('editor');
  editor.focus();
  document.execCommand('insertHTML',false,'<div class="checklist-item"><input type="checkbox"> <span>Checklist item</span></div><div><br></div>');
  editor.focus();
}

function toggleChecklistItem(cb){
  const item=cb.closest('.checklist-item');
  if(item)item.classList.toggle('checked',cb.checked);
}

function applyEffect(effect){
  restoreEditorSelection();
  var editor=document.getElementById('editor');
  var sel=window.getSelection();
  if(!sel||!sel.rangeCount)return;
  var range=sel.getRangeAt(0);
  if(range.collapsed)return;

  var span=document.createElement('span');
  if(effect==='highlight')span.className='effect-highlight';
  else if(effect==='wavy')span.className='effect-underline-wavy';
  else if(effect==='glow')span.className='effect-glow';
  else if(effect==='stamp')span.className='effect-stamp';

  try{
    var contents=range.extractContents();
    span.appendChild(contents);
    range.insertNode(span);

    var newRange=document.createRange();
    newRange.selectNodeContents(span);
    sel.removeAllRanges();
    sel.addRange(newRange);
  }catch(e){
    var ancestor=range.commonAncestorContainer;
    if(ancestor.nodeType===3)ancestor=ancestor.parentNode;
    if(ancestor && ancestor!==editor){
      ancestor.className=(ancestor.className?ancestor.className+' ':'')+span.className;
    }
  }
  editor.focus();
}

function save(){
  localStorage.setItem('jotter_pages',JSON.stringify(pages));
  localStorage.setItem('jotter_jots',JSON.stringify(jots));
  localStorage.setItem('jotter_archived',JSON.stringify(archived));
}

function hideToast(){document.getElementById('toast').classList.remove('show')}

function toast(msg,type,showUndo){
  const t=document.getElementById('toast');
  const icon=document.getElementById('toast-icon');
  const txt=document.getElementById('toast-msg');
  const undoBtn=document.getElementById('toast-undo');
  txt.textContent=msg;
  if(type==='delete'){icon.style.background='#EF4444';icon.innerHTML='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>'}
  else if(type==='error'){icon.style.background='#FBBF24';icon.innerHTML='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 9v4M12 17h.01"/></svg>'}
  else{icon.style.background='#34D399';icon.innerHTML='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>'}
  clearTimeout(undoTimeout);
  if(showUndo){
    undoBtn.style.display='inline-block';
    undoTimeout=setTimeout(()=>{lastDeleted=null;undoBtn.style.display='none';t.classList.remove('show')},5000);
  }else{
    undoBtn.style.display='none';
    undoTimeout=setTimeout(()=>t.classList.remove('show'),2500);
  }
  t.classList.add('show');
}

function fireConfetti(){
  const cv=document.getElementById('confetti-canvas');
  const ctx=cv.getContext('2d');
  cv.width=window.innerWidth;cv.height=window.innerHeight;
  const colors=['#8B5CF6','#F472B6','#FBBF24','#34D399','#38BDF8','#FB7185'];
  const pts=[];
  for(let i=0;i<60;i++){
    pts.push({x:Math.random()*cv.width,y:Math.random()*cv.height-cv.height,s:Math.random()*6+3,c:colors[Math.floor(Math.random()*colors.length)],sp:Math.random()*2.5+1.5,r:Math.random()*360,rs:(Math.random()-.5)*8,sh:Math.random()>.5?1:0});
  }
  let f=0;
  function loop(){
    ctx.clearRect(0,0,cv.width,cv.height);
    let a=false;
    pts.forEach(p=>{p.y+=p.sp;p.r+=p.rs;if(p.y<cv.height+20)a=true;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.r*Math.PI/180);ctx.fillStyle=p.c;if(p.sh){ctx.beginPath();ctx.arc(0,0,p.s/2,0,Math.PI*2);ctx.fill()}else{ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s)}ctx.restore()});
    f++;
    if(a&&f<180)requestAnimationFrame(loop);else ctx.clearRect(0,0,cv.width,cv.height);
  }
  loop();
}

window.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    if(document.getElementById('editor-modal').classList.contains('show'))closeEditor();
    if(document.getElementById('newpage-modal').classList.contains('show'))closeNewPage();
    if(document.getElementById('archive-modal').classList.contains('show'))closeArchive();
  }
});


// ===== MOBILE-FRIENDLY EVENT DELEGATION =====
function setupEvents(){
  function handleAction(e){
    var el=e.target.closest('[data-action]');
    if(!el)return;
    var action=el.dataset.action;
    if(action==='enterApp'){e.preventDefault();enterApp();}
    else if(action==='showNewPage'){e.preventDefault();showNewPage();}
    else if(action==='toggleView'){e.preventDefault();toggleView(el.dataset.view);}
    else if(action==='addNewJot'){e.preventDefault();addNewJot();}
    else if(action==='closeEditor'){e.preventDefault();closeEditor();}
    else if(action==='closeEditorOverlay'){e.preventDefault();if(e.target===el)closeEditor();}
    else if(action==='archiveCurrent'){e.preventDefault();archiveCurrent();}
    else if(action==='deleteCurrent'){e.preventDefault();deleteCurrent();}
    else if(action==='pinCurrent'){e.preventDefault();pinCurrent();}
    else if(action==='saveJot'){e.preventDefault();saveJot();}
    else if(action==='closeNewPage'){e.preventDefault();closeNewPage();}
    else if(action==='closeNewPageOverlay'){e.preventDefault();if(e.target===el)closeNewPage();}
    else if(action==='pickColor'){e.preventDefault();pickColor(el.dataset.color);}
    else if(action==='createPage'){e.preventDefault();createPage();}
    else if(action==='closeArchive'){e.preventDefault();closeArchive();}
    else if(action==='closeArchiveOverlay'){e.preventDefault();if(e.target===el)closeArchive();}
    else if(action==='fmt'){e.preventDefault();fmt(el.dataset.cmd);}
    else if(action==='foreColor'){e.preventDefault();fmt('foreColor',el.dataset.val);}
    else if(action==='changeFont'){e.preventDefault();changeFont(el.dataset.val);}
    else if(action==='applyEffect'){e.preventDefault();applyEffect(el.dataset.val);}
    else if(action==='insertChecklist'){e.preventDefault();insertChecklist();}
    else if(action==='doArchive'){e.preventDefault();e.stopPropagation();doArchive(el.dataset.jid);}
    else if(action==='doDelete'){e.preventDefault();e.stopPropagation();doDelete(el.dataset.jid);}
    else if(action==='doPin'){e.preventDefault();e.stopPropagation();doPin(el.dataset.jid);}
    else if(action==='restoreJot'){e.preventDefault();restoreJot(el.dataset.pid,el.dataset.jid);}
    else if(action==='permaDelete'){e.preventDefault();permaDelete(el.dataset.pid,el.dataset.jid);}
    else if(action==='undoDelete'){e.preventDefault();undoDelete();}
  }
  document.addEventListener('click',handleAction);
  document.addEventListener('touchend',handleAction);

  // Checkbox toggling inside the editor (checklist items)
  document.getElementById('editor').addEventListener('change',function(e){
    if(e.target && e.target.type==='checkbox')toggleChecklistItem(e.target);
  });
}
setupEvents();

    });
  });
}
